<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />

  <title>150 Jahre Feuerwehr Eibach - Gebuchtes Zeitfenster</title>
  <link rel="stylesheet" href="/style.css" />

</head>
<body>

  <script type="module">
    import init from '/frontend.js';
    await init();
